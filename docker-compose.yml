services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: skillhub_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-skillhub}
      MYSQL_USER: ${MYSQL_USER:-skillhub}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-skillhub_password}
    # 开发环境可以取消注释以下行来暴露 MySQL 端口
    # ports:
    #   - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - skillhub_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: skillhub_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - skillhub_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: skillhub_backend
    environment:
      # 应用配置
      APP_NAME: ${APP_NAME:-SkillHub}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      DEBUG: ${DEBUG:-true}

      # 数据库配置 (使用 MySQL)
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-skillhub}:${MYSQL_PASSWORD:-skillhub_password}@mysql:3306/${MYSQL_DATABASE:-skillhub}

      # Redis 配置
      REDIS_URL: redis://redis:6379/0

      # JWT 配置
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production-please}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}

      # CORS 配置
      BACKEND_CORS_ORIGINS: '["http://localhost:3000","http://frontend:3000"]'

      # 日志配置
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FILE: ${LOG_FILE:-logs/app.log}
      LOG_FORMAT: ${LOG_FORMAT:-text}
      LOG_MAX_BYTES: ${LOG_MAX_BYTES:-10485760}
      LOG_BACKUP_COUNT: ${LOG_BACKUP_COUNT:-5}

      # 通知配置
      NOTIFICATION_ENABLED: ${NOTIFICATION_ENABLED:-true}
      NOTIFICATION_EMAIL_FROM: ${NOTIFICATION_EMAIL_FROM:-}
      NOTIFICATION_EMAIL_TO: ${NOTIFICATION_EMAIL_TO:-}
      NOTIFICATION_WEBHOOK_URL: ${NOTIFICATION_WEBHOOK_URL:-}
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./skills:/root/.skillhub/skills
    networks:
      - skillhub_network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://backend:8000/api/v1}
    container_name: skillhub_frontend
    environment:
      - NODE_ENV=production
      - INTERNAL_API_URL=http://backend:8000/api/v1
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-}
    ports:
      - "3000:3000"
    networks:
      - skillhub_network
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:

networks:
  skillhub_network:
    driver: bridge
